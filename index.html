<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Engine Icon Library</title>
    
    <!-- Load Icon Library -->
    <link rel="stylesheet" href="icon-library.css">
    <script src="icon-library.js"></script>
    
    <style>
        /* ... (keep the same styles from before) ... */
    </style>
</head>
<body>

<!-- ... (keep the same HTML structure) ... -->

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // ========================================
        // ICON LIST - All available icons
        // ========================================
        const ALL_ICONS = [
            // Transform
            'transform', 'translate', 'rotate', 'scale', 'snap', 'grid',
            // Primitives
            'cube', 'sphere', 'cylinder', 'plane', 'torus',
            // Modeling
            'sculpt', 'extrude', 'bevel', 'knife',
            // Animation
            'timeline', 'keyframe', 'curve', 'dopesheet',
            // Viewport
            'camera', 'orthographic', 'perspective',
            // Materials
            'material', 'texture', 'uv',
            // Tools
            'brush', 'eyedropper', 'measure', 'pivot', 'select', 'marquee',
            // Assets
            'asset', 'import', 'export', 'preferences'
        ];

        // ========================================
        // STATE
        // ========================================
        let currentIcon = ALL_ICONS[0] || 'cube';
        let currentSize = 80;

        // ========================================
        // BUILD TOOLBAR
        // ========================================
        function buildToolbar() {
            const toolbar = document.getElementById('toolbar');
            
            // Transform tools
            const transformIcons = ['transform', 'translate', 'rotate', 'scale', 'snap'];
            transformIcons.forEach(name => {
                const btn = IconLibrary.createToolbarIcon(name, {
                    tooltip: name.charAt(0).toUpperCase() + name.slice(1),
                    onClick: () => selectIcon(name)
                });
                toolbar.appendChild(btn);
            });
            
            // Separator
            const sep1 = document.createElement('div');
            sep1.className = 'toolbar-separator';
            toolbar.appendChild(sep1);
            
            // View tools
            const viewIcons = ['grid', 'camera', 'orthographic', 'perspective'];
            viewIcons.forEach(name => {
                const btn = IconLibrary.createToolbarIcon(name, {
                    tooltip: name.charAt(0).toUpperCase() + name.slice(1),
                    onClick: () => selectIcon(name)
                });
                toolbar.appendChild(btn);
            });
            
            // Separator
            const sep2 = document.createElement('div');
            sep2.className = 'toolbar-separator';
            toolbar.appendChild(sep2);
            
            // Tools
            const toolsIcons = ['select', 'marquee', 'sculpt', 'brush', 'measure'];
            toolsIcons.forEach(name => {
                const btn = IconLibrary.createToolbarIcon(name, {
                    tooltip: name.charAt(0).toUpperCase() + name.slice(1),
                    onClick: () => selectIcon(name)
                });
                toolbar.appendChild(btn);
            });
            
            // Spacer
            const spacer = document.createElement('div');
            spacer.className = 'toolbar-spacer';
            toolbar.appendChild(spacer);
            
            // Quick actions
            const actionIcons = ['import', 'export', 'preferences'];
            actionIcons.forEach(name => {
                const btn = IconLibrary.createToolbarIcon(name, {
                    tooltip: name.charAt(0).toUpperCase() + name.slice(1),
                    onClick: () => selectIcon(name)
                });
                toolbar.appendChild(btn);
            });
        }

        // ========================================
        // BUILD ICON GRID
        // ========================================
        function buildIconGrid() {
            const grid = document.getElementById('iconGrid');
            grid.innerHTML = '';
            
            ALL_ICONS.forEach(name => {
                const item = document.createElement('button');
                item.className = 'icon-browser-item';
                if (name === currentIcon) item.classList.add('active');
                
                const icon = IconLibrary.create(name, {
                    size: 24,
                    color: 'currentColor'
                });
                
                const label = document.createElement('span');
                label.textContent = name;
                
                item.appendChild(icon);
                item.appendChild(label);
                
                item.addEventListener('click', () => {
                    selectIcon(name);
                    document.querySelectorAll('.icon-browser-item').forEach(el => {
                        el.classList.remove('active');
                    });
                    item.classList.add('active');
                });
                
                grid.appendChild(item);
            });
            
            document.getElementById('iconCount').textContent = `${ALL_ICONS.length} icons`;
            document.getElementById('statusCount').textContent = `${ALL_ICONS.length} icons`;
        }

        // ========================================
        // BUILD VIEWPORT CONTROLS
        // ========================================
        function buildViewportControls() {
            const controls = document.getElementById('viewportControls');
            
            const sizes = [16, 24, 32, 48, 64, 80, 100, 120];
            
            const minusBtn = IconLibrary.createButton('minus', {
                size: 'sm',
                tooltip: 'Decrease size',
                onClick: () => {
                    const idx = sizes.indexOf(currentSize);
                    if (idx > 0) {
                        currentSize = sizes[idx - 1];
                        updatePreview();
                    }
                }
            });
            controls.appendChild(minusBtn);
            
            const sizeLabel = document.createElement('span');
            sizeLabel.className = 'size-label';
            sizeLabel.textContent = `${currentSize}px`;
            sizeLabel.id = 'sizeLabel';
            controls.appendChild(sizeLabel);
            
            const plusBtn = IconLibrary.createButton('plus', {
                size: 'sm',
                tooltip: 'Increase size',
                onClick: () => {
                    const idx = sizes.indexOf(currentSize);
                    if (idx < sizes.length - 1) {
                        currentSize = sizes[idx + 1];
                        updatePreview();
                    }
                }
            });
            controls.appendChild(plusBtn);
            
            const sep = document.createElement('span');
            sep.style.width = '1px';
            sep.style.height = '16px';
            sep.style.background = 'var(--border-color)';
            sep.style.margin = '0 4px';
            controls.appendChild(sep);
            
            const resetBtn = IconLibrary.createButton('cube', {
                size: 'sm',
                tooltip: 'Reset view',
                onClick: () => {
                    currentSize = 80;
                    updatePreview();
                }
            });
            controls.appendChild(resetBtn);
        }

        // ========================================
        // UPDATE PREVIEW
        // ========================================
        function updatePreview() {
            const preview = document.getElementById('viewportPreview');
            preview.innerHTML = '';
            
            const icon = IconLibrary.create(currentIcon, {
                size: currentSize,
                color: '#c8d0d8'
            });
            preview.appendChild(icon);
            
            const sizeLabel = document.getElementById('sizeLabel');
            if (sizeLabel) sizeLabel.textContent = `${currentSize}px`;
            
            document.getElementById('propSize').textContent = `${currentSize}px`;
        }

        // ========================================
        // SELECT ICON
        // ========================================
        function selectIcon(name) {
            currentIcon = name;
            
            // Update viewport
            updatePreview();
            document.getElementById('viewportName').textContent = name;
            
            // Update properties
            document.getElementById('propName').textContent = name;
            document.getElementById('propColor').textContent = '#c8d0d8';
            document.getElementById('propStatus').textContent = 'Loaded';
            
            // Update tags
            const tagsContainer = document.getElementById('propTags');
            tagsContainer.innerHTML = `<span class="property-tag">game-engine</span>
                                       <span class="property-tag">${name}</span>`;
            
            // Update status
            document.getElementById('statusText').textContent = `Selected: ${name}`;
            
            // Update status icon
            const statusIcon = document.getElementById('statusIcon');
            statusIcon.innerHTML = '';
            const statusIconEl = IconLibrary.create(name, {
                size: 14,
                color: 'var(--accent-green)'
            });
            statusIcon.appendChild(statusIconEl);
            
            // Highlight in toolbar
            document.querySelectorAll('.toolbar-icon').forEach(el => {
                el.classList.remove('active');
            });
        }

        // ========================================
        // INIT
        // ========================================
        buildToolbar();
        buildIconGrid();
        buildViewportControls();
        selectIcon(ALL_ICONS[0] || 'cube');

        // Expose for debugging
        window.selectIcon = selectIcon;
        
        console.log('🚀 Game Engine Icon Library ready!');
        console.log(`📦 ${ALL_ICONS.length} icons available`);
    });
</script>

</body>
</html>
