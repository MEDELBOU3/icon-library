<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Engine Icon Library</title>
    
    <style>
        /* Professional Game Engine Theme */
        :root {
            --bg-primary: #14181f;
            --bg-secondary: #1a2029;
            --bg-tertiary: #222a33;
            --bg-panel: #1e2530;
            --text-primary: #c8d0d8;
            --text-secondary: #8a929a;
            --text-muted: #4a525a;
            --border-color: #2a323a;
            --border-light: #3a424a;
            --accent-blue: #4a9eff;
            --accent-green: #54d98c;
            --accent-orange: #f0a030;
            --accent-red: #e06050;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            font-size: 13px;
            -webkit-font-smoothing: antialiased;
        }
        
        .app {
            display: grid;
            grid-template-rows: 32px 44px 1fr 24px;
            height: 100vh;
            background: var(--bg-primary);
        }
        
        .menu-bar {
            display: flex;
            align-items: center;
            gap: 2px;
            padding: 0 10px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
        }
        
        .menu-item {
            padding: 4px 12px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            border-radius: 0;
            font-weight: 500;
            letter-spacing: 0.3px;
            transition: all 0.15s ease;
        }
        
        .menu-item:hover {
            color: var(--text-primary);
            background: rgba(200, 208, 216, 0.06);
        }
        
        .menu-brand {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-right: 16px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.5px;
        }
        
        .menu-brand .brand-dot {
            width: 8px;
            height: 8px;
            border-radius: 0;
            background: var(--accent-blue);
        }
        
        .menu-separator {
            width: 1px;
            height: 20px;
            background: var(--border-color);
            margin: 0 4px;
        }
        
        .toolbar {
            display: flex;
            align-items: center;
            gap: 2px;
            padding: 4px 8px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            overflow-x: auto;
        }
        
        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 2px;
            padding: 0 4px;
        }
        
        .toolbar-group-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            padding: 0 4px;
            font-weight: 600;
        }
        
        .toolbar-separator {
            width: 1px;
            height: 24px;
            background: var(--border-color);
            margin: 0 4px;
        }
        
        .toolbar-spacer {
            flex: 1;
        }
        
        .toolbar-icon {
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            padding: 0;
        }
        
        .toolbar-icon:hover {
            color: var(--text-primary);
            background: rgba(200, 208, 216, 0.06);
        }
        
        .toolbar-icon.active {
            color: var(--accent-blue);
            background: rgba(74, 158, 255, 0.1);
        }
        
        .workspace {
            display: grid;
            grid-template-columns: 220px 1fr 240px;
            gap: 1px;
            background: var(--border-color);
            padding: 1px;
            overflow: hidden;
        }
        
        .panel {
            background: var(--bg-secondary);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 10px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            min-height: 28px;
            flex-shrink: 0;
        }
        
        .panel-content {
            flex: 1;
            overflow: auto;
            padding: 8px;
        }
        
        .icon-browser-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
        }
        
        .icon-browser-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 6px 4px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 0;
            font-size: 9px;
            transition: all 0.15s ease;
            font-family: inherit;
        }
        
        .icon-browser-item:hover {
            color: var(--text-primary);
            background: rgba(200, 208, 216, 0.06);
            border-color: rgba(200, 208, 216, 0.08);
        }
        
        .icon-browser-item.active {
            color: var(--accent-blue);
            background: rgba(74, 158, 255, 0.1);
            border-color: rgba(74, 158, 255, 0.2);
        }
        
        .icon-browser-item .icon {
            width: 24px;
            height: 24px;
        }
        
        .icon-browser-item span {
            font-size: 8px;
            line-height: 1;
            text-align: center;
            word-break: break-all;
            color: var(--text-muted);
        }
        
        .icon-browser-item:hover span {
            color: var(--text-secondary);
        }
        
        .icon-browser-item.active span {
            color: var(--accent-blue);
        }
        
        .viewport {
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .viewport-grid {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
        }
        
        .viewport-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            z-index: 1;
        }
        
        .viewport-icon-preview {
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            background: rgba(26, 32, 41, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 0;
        }
        
        .viewport-icon-preview .icon {
            width: 80px;
            height: 80px;
        }
        
        .viewport-icon-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            background: rgba(0, 0, 0, 0.7);
            padding: 4px 16px;
            border: 1px solid var(--border-color);
            font-family: 'SF Mono', 'Consolas', monospace;
        }
        
        .viewport-controls {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 0;
        }
        
        .viewport-controls .size-label {
            font-size: 11px;
            color: var(--text-secondary);
            padding: 0 8px;
            min-width: 36px;
            text-align: center;
            font-family: 'SF Mono', 'Consolas', monospace;
        }
        
        .icon-btn {
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            padding: 4px;
            border-radius: 0;
        }
        
        .icon-btn:hover {
            color: var(--text-primary);
            background: rgba(200, 208, 216, 0.06);
        }
        
        .icon-btn-sm {
            width: 24px;
            height: 24px;
        }
        
        .icon-btn-sm .icon {
            width: 14px;
            height: 14px;
        }
        
        .property-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 12px;
        }
        
        .property-label {
            color: var(--text-secondary);
            font-weight: 500;
        }
        
        .property-value {
            color: var(--text-primary);
            font-family: 'SF Mono', 'Consolas', monospace;
            font-size: 11px;
        }
        
        .property-value.green {
            color: var(--accent-green);
        }
        
        .property-section {
            margin-top: 12px;
        }
        
        .property-section-title {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 600;
        }
        
        .property-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        
        .property-tag {
            font-size: 9px;
            padding: 2px 8px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            border-radius: 0;
        }
        
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            font-size: 11px;
            color: var(--text-secondary);
        }
        
        .status-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .status-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 0;
            background: var(--accent-green);
        }
        
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 0;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--border-light);
        }
        
        .icon-loading {
            opacity: 0.5;
            animation: pulse 1s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        @media (max-width: 1024px) {
            .workspace {
                grid-template-columns: 180px 1fr 200px;
            }
        }
        
        @media (max-width: 768px) {
            .workspace {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr auto;
            }
            
            .panel {
                max-height: 200px;
            }
            
            .viewport {
                min-height: 300px;
            }
        }
    </style>
</head>
<body>

<div class="app">
    <div class="menu-bar">
        <div class="menu-brand">
            <span class="brand-dot"></span>
            Icon Library
        </div>
        <div class="menu-separator"></div>
        <button class="menu-item">File</button>
        <button class="menu-item">Edit</button>
        <button class="menu-item">View</button>
        <button class="menu-item">Tools</button>
        <button class="menu-item">Window</button>
        <button class="menu-item">Help</button>
    </div>
    
    <div class="toolbar" id="toolbar"></div>
    
    <div class="workspace">
        <div class="panel">
            <div class="panel-header">
                <span>Icon Browser</span>
                <span id="iconCount" style="font-size: 10px; font-weight: 400;">0 icons</span>
            </div>
            <div class="panel-content">
                <div id="iconGrid" class="icon-browser-grid"></div>
            </div>
        </div>
        
        <div class="viewport">
            <div class="viewport-grid"></div>
            
            <div class="viewport-center">
                <div class="viewport-icon-preview" id="viewportPreview"></div>
                <div class="viewport-icon-name" id="viewportName">select an icon</div>
            </div>
            
            <div class="viewport-controls" id="viewportControls"></div>
        </div>
        
        <div class="panel">
            <div class="panel-header">
                <span>Properties</span>
            </div>
            <div class="panel-content">
                <div id="properties">
                    <div class="property-row">
                        <span class="property-label">Name</span>
                        <span class="property-value" id="propName">—</span>
                    </div>
                    <div class="property-row">
                        <span class="property-label">Size</span>
                        <span class="property-value" id="propSize">—</span>
                    </div>
                    <div class="property-row">
                        <span class="property-label">Color</span>
                        <span class="property-value" id="propColor">—</span>
                    </div>
                    <div class="property-row">
                        <span class="property-label">Status</span>
                        <span class="property-value green" id="propStatus">Ready</span>
                    </div>
                    
                    <div class="property-section">
                        <div class="property-section-title">Tags</div>
                        <div class="property-tags" id="propTags">
                            <span class="property-tag">No tags</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="status-bar">
        <div class="status-left">
            <div class="status-item">
                <span class="status-dot"></span>
                <span id="statusText">Ready</span>
            </div>
            <div class="status-item">
                <span id="statusIcon"></span>
            </div>
        </div>
        <div class="status-right">
            <div class="status-item">
                <span id="statusCount">0 icons</span>
            </div>
            <div class="status-item">
                <span>v1.0.0</span>
            </div>
        </div>
    </div>
</div>

<script>
/**
 * Icon Library - Game Engine Edition
 * Automatically loads icons from the icons/ folder
 */
(function(global) {
  'use strict';

  const ICON_REGISTRY = new Map();
  const ICON_LOADING = new Set();
  const ICON_CACHE = new Map();

  const CONFIG = {
    baseUrl: getBaseUrl(),
    fallbackIcon: 'cube',
    defaultSize: 20,
    defaultColor: '#c8d0d8'
  };

  function getBaseUrl() {
    const scripts = document.getElementsByTagName('script');
    const currentScript = scripts[scripts.length - 1];
    const scriptSrc = currentScript.src;
    
    if (scriptSrc) {
      const url = new URL(scriptSrc);
      const pathParts = url.pathname.split('/');
      pathParts.pop();
      const basePath = pathParts.join('/') + '/icons/';
      return `${url.origin}${basePath}`;
    }
    
    return window.location.origin + '/icons/';
  }

  function getFallbackSVG() {
    return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
      <rect x="3" y="3" width="18" height="18" stroke="currentColor" stroke-width="1.5" fill="none"/>
      <line x1="3" y1="12" x2="21" y2="12" stroke="currentColor" stroke-width="1.5"/>
      <line x1="12" y1="3" x2="12" y2="21" stroke="currentColor" stroke-width="1.5"/>
    </svg>`;
  }

  // All icon names - automatically detected from the icons folder
  const ALL_ICON_NAMES = [
    'transform', 'translate', 'rotate', 'scale', 'snap', 'grid',
    'cube', 'sphere', 'cylinder', 'plane', 'torus',
    'sculpt', 'extrude', 'bevel', 'knife',
    'timeline', 'keyframe', 'curve', 'dopesheet',
    'camera', 'orthographic', 'perspective',
    'material', 'texture', 'uv',
    'brush', 'eyedropper', 'measure', 'pivot', 'select', 'marquee',
    'asset', 'import', 'export', 'preferences'
  ];

  function registerAllIcons() {
    ALL_ICON_NAMES.forEach(name => {
      ICON_REGISTRY.set(name, {
        svg: null,
        metadata: { category: 'game-engine', tags: [], loaded: false }
      });
    });
  }

  function loadIconFromCDN(name) {
    if (ICON_LOADING.has(name)) return;
    if (ICON_CACHE.has(name)) return;
    
    ICON_LOADING.add(name);
    
    const url = `${CONFIG.baseUrl}${name}.svg`;
    
    fetch(url)
      .then(response => {
        if (!response.ok) throw new Error(`Failed to load icon: ${name} (${response.status})`);
        return response.text();
      })
      .then(svg => {
        if (!svg.includes('<svg')) {
          throw new Error(`Invalid SVG content for: ${name}`);
        }
        
        ICON_REGISTRY.set(name, {
          svg: svg,
          metadata: { category: 'game-engine', tags: [], loaded: true }
        });
        ICON_CACHE.set(name, svg);
        ICON_LOADING.delete(name);
        
        document.dispatchEvent(new CustomEvent('iconLoaded', { 
          detail: { name, svg } 
        }));
        
        console.log(`✅ Icon loaded: ${name}`);
      })
      .catch(error => {
        console.error(`❌ Failed to load icon: ${name}`, error);
        ICON_LOADING.delete(name);
        
        const fallback = getFallbackSVG();
        ICON_REGISTRY.set(name, {
          svg: fallback,
          metadata: { category: 'game-engine', tags: [], loaded: true }
        });
        ICON_CACHE.set(name, fallback);
      });
  }

  function getIcon(name, options = {}) {
    const iconName = name || CONFIG.fallbackIcon;
    
    if (ICON_CACHE.has(iconName)) {
      return ICON_CACHE.get(iconName);
    }
    
    if (ICON_REGISTRY.has(iconName)) {
      const data = ICON_REGISTRY.get(iconName);
      if (data.svg) {
        ICON_CACHE.set(iconName, data.svg);
        return data.svg;
      }
    }
    
    if (!ICON_LOADING.has(iconName) && iconName !== CONFIG.fallbackIcon) {
      loadIconFromCDN(iconName);
    }
    
    if (ICON_CACHE.has(CONFIG.fallbackIcon)) {
      return ICON_CACHE.get(CONFIG.fallbackIcon);
    }
    
    const fallback = getFallbackSVG();
    ICON_CACHE.set(CONFIG.fallbackIcon, fallback);
    return fallback;
  }

  function createIcon(name, options = {}) {
    const {
      size = CONFIG.defaultSize,
      color = CONFIG.defaultColor,
      className = '',
      title = '',
      ariaLabel = '',
      role = 'img',
      onClick = null
    } = options;

    const container = document.createElement('span');
    container.className = `icon ${className}`.trim();
    container.style.width = `${size}px`;
    container.style.height = `${size}px`;
    container.style.color = color;
    container.style.display = 'inline-flex';
    container.style.alignItems = 'center';
    container.style.justifyContent = 'center';
    container.setAttribute('role', role);
    
    if (title) container.setAttribute('title', title);
    if (ariaLabel) container.setAttribute('aria-label', ariaLabel);
    if (onClick) container.addEventListener('click', onClick);

    let svgContent = getIcon(name, options);
    
    if (ICON_LOADING.has(name)) {
      container.classList.add('icon-loading');
      
      const loadHandler = (e) => {
        if (e.detail.name === name) {
          container.innerHTML = e.detail.svg;
          container.classList.remove('icon-loading');
          document.removeEventListener('iconLoaded', loadHandler);
        }
      };
      
      document.addEventListener('iconLoaded', loadHandler);
    } else {
      container.innerHTML = svgContent;
    }

    return container;
  }

  function createToolbarIcon(name, options = {}) {
    const {
      active = false,
      disabled = false,
      onClick = null,
      tooltip = ''
    } = options;

    const button = document.createElement('button');
    button.className = 'toolbar-icon';
    if (active) button.classList.add('active');
    if (disabled) button.classList.add('disabled');
    if (tooltip) button.setAttribute('title', tooltip);
    if (onClick) button.addEventListener('click', onClick);

    const icon = createIcon(name, {
      size: 18,
      color: 'currentColor'
    });
    
    button.appendChild(icon);
    return button;
  }

  function createButton(name, options = {}) {
    const {
      size = 'md',
      label = '',
      className = '',
      active = false,
      disabled = false,
      onClick = null,
      tooltip = ''
    } = options;

    const button = document.createElement('button');
    button.className = `icon-btn icon-btn-${size} ${className}`.trim();
    if (active) button.classList.add('active');
    if (disabled) button.classList.add('disabled');
    if (tooltip) button.setAttribute('title', tooltip);
    if (onClick) button.addEventListener('click', onClick);

    const iconSize = size === 'xs' ? 12 : size === 'sm' ? 14 : size === 'lg' ? 20 : 16;
    const icon = createIcon(name, {
      size: iconSize,
      color: 'currentColor'
    });
    
    button.appendChild(icon);
    
    if (label) {
      const labelSpan = document.createElement('span');
      labelSpan.textContent = label;
      labelSpan.style.marginLeft = '6px';
      labelSpan.style.fontSize = '12px';
      button.appendChild(labelSpan);
    }

    return button;
  }

  function preloadIcons(iconNames) {
    iconNames.forEach(name => {
      if (!ICON_CACHE.has(name) && !ICON_LOADING.has(name)) {
        loadIconFromCDN(name);
      }
    });
  }

  function configure(config) {
    Object.assign(CONFIG, config);
  }

  const IconLibrary = {
    create: createIcon,
    createToolbarIcon: createToolbarIcon,
    createButton: createButton,
    preload: preloadIcons,
    configure: configure,
    version: '1.0.0',
    getAllIconNames: () => ALL_ICON_NAMES,
    getLoadedIcons: () => Array.from(ICON_CACHE.keys())
  };

  registerAllIcons();

  // Preload essential icons
  setTimeout(() => {
    preloadIcons(['cube', 'transform', 'translate', 'rotate', 'scale']);
  }, 100);

  if (typeof module !== 'undefined' && module.exports) {
    module.exports = IconLibrary;
  } else {
    global.IconLibrary = IconLibrary;
  }

  console.log('🎮 Game Engine Icon Library loaded!');
  console.log(`📁 Base URL: ${CONFIG.baseUrl}`);
  console.log(`📦 ${ALL_ICON_NAMES.length} icons registered`);

})(typeof window !== 'undefined' ? window : global);

// ========================================
// APPLICATION CODE
// ========================================
document.addEventListener('DOMContentLoaded', function() {
  const ALL_ICONS = IconLibrary.getAllIconNames();
  let currentIcon = ALL_ICONS[0] || 'cube';
  let currentSize = 80;

  // Build Toolbar
  function buildToolbar() {
    const toolbar = document.getElementById('toolbar');
    
    const groups = [
      { label: 'Transform', icons: ['transform', 'translate', 'rotate', 'scale', 'snap'] },
      { label: 'View', icons: ['grid', 'camera', 'orthographic', 'perspective'] },
      { label: 'Tools', icons: ['select', 'marquee', 'sculpt', 'brush', 'measure'] }
    ];
    
    groups.forEach((group, index) => {
      if (index > 0) {
        const sep = document.createElement('div');
        sep.className = 'toolbar-separator';
        toolbar.appendChild(sep);
      }
      
      const label = document.createElement('span');
      label.className = 'toolbar-group-label';
      label.textContent = group.label;
      toolbar.appendChild(label);
      
      group.icons.forEach(name => {
        const btn = IconLibrary.createToolbarIcon(name, {
          tooltip: name.charAt(0).toUpperCase() + name.slice(1),
          onClick: () => selectIcon(name)
        });
        toolbar.appendChild(btn);
      });
    });
    
    const spacer = document.createElement('div');
    spacer.className = 'toolbar-spacer';
    toolbar.appendChild(spacer);
    
    const actionIcons = ['import', 'export', 'preferences'];
    actionIcons.forEach(name => {
      const btn = IconLibrary.createToolbarIcon(name, {
        tooltip: name.charAt(0).toUpperCase() + name.slice(1),
        onClick: () => selectIcon(name)
      });
      toolbar.appendChild(btn);
    });
  }

  // Build Icon Grid
  function buildIconGrid() {
    const grid = document.getElementById('iconGrid');
    grid.innerHTML = '';
    
    ALL_ICONS.forEach(name => {
      const item = document.createElement('button');
      item.className = 'icon-browser-item';
      if (name === currentIcon) item.classList.add('active');
      
      const icon = IconLibrary.create(name, {
        size: 24,
        color: 'currentColor'
      });
      
      const label = document.createElement('span');
      label.textContent = name;
      
      item.appendChild(icon);
      item.appendChild(label);
      
      item.addEventListener('click', () => {
        selectIcon(name);
        document.querySelectorAll('.icon-browser-item').forEach(el => {
          el.classList.remove('active');
        });
        item.classList.add('active');
      });
      
      grid.appendChild(item);
    });
    
    document.getElementById('iconCount').textContent = `${ALL_ICONS.length} icons`;
    document.getElementById('statusCount').textContent = `${ALL_ICONS.length} icons`;
  }

  // Build Viewport Controls
  function buildViewportControls() {
    const controls = document.getElementById('viewportControls');
    const sizes = [16, 24, 32, 48, 64, 80, 100, 120];
    
    const minusBtn = IconLibrary.createButton('minus', {
      size: 'sm',
      tooltip: 'Decrease size',
      onClick: () => {
        const idx = sizes.indexOf(currentSize);
        if (idx > 0) {
          currentSize = sizes[idx - 1];
          updatePreview();
        }
      }
    });
    controls.appendChild(minusBtn);
    
    const sizeLabel = document.createElement('span');
    sizeLabel.className = 'size-label';
    sizeLabel.textContent = `${currentSize}px`;
    sizeLabel.id = 'sizeLabel';
    controls.appendChild(sizeLabel);
    
    const plusBtn = IconLibrary.createButton('plus', {
      size: 'sm',
      tooltip: 'Increase size',
      onClick: () => {
        const idx = sizes.indexOf(currentSize);
        if (idx < sizes.length - 1) {
          currentSize = sizes[idx + 1];
          updatePreview();
        }
      }
    });
    controls.appendChild(plusBtn);
    
    const sep = document.createElement('span');
    sep.style.width = '1px';
    sep.style.height = '16px';
    sep.style.background = 'var(--border-color)';
    sep.style.margin = '0 4px';
    controls.appendChild(sep);
    
    const resetBtn = IconLibrary.createButton('cube', {
      size: 'sm',
      tooltip: 'Reset view',
      onClick: () => {
        currentSize = 80;
        updatePreview();
      }
    });
    controls.appendChild(resetBtn);
  }

  // Update Preview
  function updatePreview() {
    const preview = document.getElementById('viewportPreview');
    preview.innerHTML = '';
    
    const icon = IconLibrary.create(currentIcon, {
      size: currentSize,
      color: '#c8d0d8'
    });
    preview.appendChild(icon);
    
    const sizeLabel = document.getElementById('sizeLabel');
    if (sizeLabel) sizeLabel.textContent = `${currentSize}px`;
    
    document.getElementById('propSize').textContent = `${currentSize}px`;
  }

  // Select Icon
  function selectIcon(name) {
    currentIcon = name;
    
    updatePreview();
    document.getElementById('viewportName').textContent = name;
    
    document.getElementById('propName').textContent = name;
    document.getElementById('propColor').textContent = '#c8d0d8';
    document.getElementById('propStatus').textContent = 'Loaded';
    
    const tagsContainer = document.getElementById('propTags');
    tagsContainer.innerHTML = `<span class="property-tag">game-engine</span>
                               <span class="property-tag">${name}</span>`;
    
    document.getElementById('statusText').textContent = `Selected: ${name}`;
    
    const statusIcon = document.getElementById('statusIcon');
    statusIcon.innerHTML = '';
    const statusIconEl = IconLibrary.create(name, {
      size: 14,
      color: 'var(--accent-green)'
    });
    statusIcon.appendChild(statusIconEl);
    
    document.querySelectorAll('.toolbar-icon').forEach(el => {
      el.classList.remove('active');
    });
  }

  // Init
  buildToolbar();
  buildIconGrid();
  buildViewportControls();
  selectIcon(ALL_ICONS[0] || 'cube');

  // Preload all icons in background
  setTimeout(() => {
    IconLibrary.preload(ALL_ICONS.slice(5));
  }, 500);

  window.selectIcon = selectIcon;
  
  console.log('🚀 Game Engine Icon Library ready!');
  console.log(`📦 ${ALL_ICONS.length} icons available`);
});
</script>

</body>
</html>
