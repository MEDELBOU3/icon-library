<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Bounding box with wireframe edges -->
  <rect x="14" y="18" width="36" height="28" rx="3" fill="none" stroke="#4A90D9" stroke-width="2.5"/>
  <!-- Inner wireframe lines -->
  <line x1="14" y1="26" x2="50" y2="26" stroke="#4A90D9" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="14" y1="34" x2="50" y2="34" stroke="#4A90D9" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="14" y1="42" x2="50" y2="42" stroke="#4A90D9" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="22" y1="18" x2="22" y2="46" stroke="#4A90D9" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="30" y1="18" x2="30" y2="46" stroke="#4A90D9" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="38" y1="18" x2="38" y2="46" stroke="#4A90D9" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- Collision points -->
  <circle cx="14" cy="18" r="2.5" fill="#FF6B35"/>
  <circle cx="50" cy="18" r="2.5" fill="#FF6B35"/>
  <circle cx="14" cy="46" r="2.5" fill="#FF6B35"/>
  <circle cx="50" cy="46" r="2.5" fill="#FF6B35"/>
</svg>
