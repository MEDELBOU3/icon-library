<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Head -->
  <circle cx="32" cy="14" r="7" fill="#4A90D9" stroke="#2C5F8A" stroke-width="2"/>
  <!-- Body -->
  <line x1="32" y1="21" x2="32" y2="34" stroke="#4A90D9" stroke-width="3"/>
  <!-- Arms (angled for ragdoll effect) -->
  <line x1="32" y1="24" x2="18" y2="18" stroke="#4A90D9" stroke-width="2.5"/>
  <line x1="32" y1="24" x2="46" y2="16" stroke="#4A90D9" stroke-width="2.5"/>
  <!-- Legs (spread for ragdoll effect) -->
  <line x1="32" y1="34" x2="22" y2="46" stroke="#4A90D9" stroke-width="2.5"/>
  <line x1="32" y1="34" x2="44" y2="44" stroke="#4A90D9" stroke-width="2.5"/>
  <!-- Joint dots -->
  <circle cx="32" cy="21" r="2.5" fill="#FF6B35"/>
  <circle cx="32" cy="24" r="2" fill="#FF6B35"/>
  <circle cx="18" cy="18" r="2" fill="#FF6B35"/>
  <circle cx="46" cy="16" r="2" fill="#FF6B35"/>
  <circle cx="32" cy="34" r="2.5" fill="#FF6B35"/>
  <circle cx="22" cy="46" r="2" fill="#FF6B35"/>
  <circle cx="44" cy="44" r="2" fill="#FF6B35"/>
</svg>
